<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Rubber Plot Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="./../assets/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container mt-5">
        <input type="hidden" id="chkLogin">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div></div>
            <div id="user-panel" class="d-flex align-items-center">
                <div id="profile-section" class="dropdown d-flex align-items-center" style="display: none !important;">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        <img id="profile-image" class="rounded-circle me-2"
                            style="width: 32px; height: 32px; object-fit: cover" alt="Profile picture">
                        <span id="display-name" class="fw-medium"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" id="logout-link">Logout</a></li>
                    </ul>
                </div>
                <a href="/rub/auth/google" id="google-login-link">
                    <img src="https://developers.google.com/identity/images/btn_google_signin_dark_normal_web.png"
                        alt="Sign in with Google">
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-8">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="label">แปลงยาง</div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-warning" id="exportSqlBtn">
                                    <i class="bi bi-database-down me-1"></i>Export rub2.sql
                                </button>
                                <button class="btn btn-light" id="createProjectBtn">
                                    <i class="bi bi-folder-plus me-1"></i>สร้าง Project
                                </button>
                            </div>
                        </div>
                        <div class="mt-3" id="layerList"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-4">
                <div class="card">
                    <div class="card-body">
                        <div class="label">ทีมงานคุณภาพ</div>
                        <div class="mt-3" id="usersList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         MODAL 1: สร้าง Project (create table only, no upload)
    ═══════════════════════════════════════════════════════ -->
    <div class="modal fade" id="createProjectModal" tabindex="-1" aria-labelledby="createProjectModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title f" id="createProjectModalLabel">
                        <i class="bi bi-folder-plus me-2"></i>สร้าง Project ใหม่
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="cp_province" class="form-label">ชื่อจังหวัด <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="cp_province" placeholder="เช่น champhon, krabi, suratthani">
                        <small class="text-muted">ใช้ตัวอักษรภาษาอังกฤษ ตัวเล็ก ไม่มีเว้นวรรค</small>
                    </div>
                    <div class="mb-3">
                        <label for="cp_person" class="form-label">ชื่อบุคคล <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="cp_person" placeholder="เช่น earn, noi, kung">
                        <small class="text-muted">ใช้ตัวอักษรภาษาอังกฤษ ตัวเล็ก ไม่มีเว้นวรรค</small>
                    </div>
                    <div class="mb-3">
                        <label for="cp_remark" class="form-label">Remark</label>
                        <textarea class="form-control" id="cp_remark" rows="2" placeholder="หมายเหตุ (ไม่บังคับ)"></textarea>
                    </div>
                    <!-- Preview table name -->
                    <div class="table-name-preview" id="tableNamePreview" style="display:none;">
                        <i class="bi bi-table me-2"></i>
                        ชื่อ Table ที่จะสร้าง: <strong id="previewTableName"></strong>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary" id="btnCreateProject">
                        <i class="bi bi-check-circle me-1"></i>สร้าง Project
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         MODAL 2: เพิ่มข้อมูล (upload shapefile to existing table)
    ═══════════════════════════════════════════════════════ -->
    <div class="modal fade" id="addDataModal" tabindex="-1" aria-labelledby="addDataModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title f" id="addDataModalLabel">
                        <i class="bi bi-upload me-2"></i>เพิ่มข้อมูล
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Table เป้าหมาย</label>
                        <input type="text" class="form-control" id="ad_tb_name" readonly>
                    </div>
                    <!-- Geometry type selector - card style -->
                    <div class="mb-3">
                        <label class="form-label">ประเภทข้อมูล <span class="text-danger">*</span></label>
                        <div class="geom-type-selector d-flex gap-3">
                            <div class="geom-type-card" id="card_polygon" data-value="polygon">
                                <i class="bi bi-pentagon-fill geom-icon"></i>
                                <div class="geom-label">Polygon</div>
                                <div class="geom-sublabel">พื้นที่แปลง</div>
                            </div>
                            <div class="geom-type-card" id="card_point" data-value="point">
                                <i class="bi bi-geo-alt-fill geom-icon"></i>
                                <div class="geom-label">Point</div>
                                <div class="geom-sublabel">จุดพิกัด</div>
                            </div>
                        </div>
                        <input type="hidden" id="ad_geom_type" value="">
                    </div>
                    <div class="mb-3">
                        <label for="ad_shpFile" class="form-label">อัปโหลด Shapefile (ZIP) <span class="text-danger">*</span></label>
                        <div class="upload-zone" id="uploadZone">
                            <i class="bi bi-cloud-arrow-up-fill upload-zone-icon"></i>
                            <div class="upload-zone-text">คลิกหรือลากไฟล์มาวางที่นี่</div>
                            <div class="upload-zone-sub">รองรับ ZIP ที่มี .shp .shx .dbf .prj</div>
                            <input type="file" id="ad_shpFile" accept=".zip" class="upload-file-input">
                        </div>
                        <div id="fileNameDisplay" class="file-name-display" style="display:none;"></div>
                    </div>
                    <div id="ad_uploadProgress" style="display: none;" class="mb-2">
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                                aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="ad_progressBar"
                                style="width: 0%"></div>
                        </div>
                        <small id="ad_progressText">กำลังอัปโหลด...</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary" id="btnAddData">
                        <i class="bi bi-cloud-upload me-1"></i>อัปโหลดข้อมูล
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="./app.js"></script>
</body>

</html>
