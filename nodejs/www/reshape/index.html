<!DOCTYPE html>
<html>

<head>
    <title>Leaflet Geoman with Turf Area - Click to Edit</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="./../assets/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container-fluid app-wrapper px-3">

        <!-- ================= ROW 1 ================= -->
        <div class="row main-row">

            <!-- Left Column: Map -->
            <div class="col-sm-8 map-col d-flex">
                <div class="card flex-fill" id="map"></div>
            </div>

            <!-- Right Column: Sidebar -->
            <div class="col-sm-4 sidebar-col">

                <!-- User Panel -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div></div>
                    <div id="user-panel" class="d-flex align-items-center">
                        <div id="profile-section" class="dropdown d-flex align-items-center"
                            style="display: none !important;">
                            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle"
                                data-bs-toggle="dropdown">
                                <img id="profile-image" class="rounded-circle me-2"
                                    style="width: 32px; height: 32px; object-fit: cover">
                                <span id="display-name" class="fw-medium"></span>
                                <input type="hidden" id="displayName">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#" id="logout-link">Logout</a></li>
                            </ul>
                        </div>
                        <a href="/rub/auth/google" id="google-login-link">
                            <img src="https://developers.google.com/identity/images/btn_google_signin_dark_normal_web.png"
                                alt="Sign in with Google">
                        </a>
                    </div>
                </div>

                <!-- Navigation Menu -->
                <div class="card mb-2">
                    <div class="card-body nav-buttons">
                        <div class="section-title">
                            <i class="bi bi-compass"></i> เมนู
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <a class="btn btn-secondary" href="./../index.html">
                                <i class="bi bi-house-heart-fill"></i> Home
                            </a>
                            <button class="btn btn-secondary" id="dashboard">Dashboard</button>
                        </div>
                    </div>
                </div>

                <!-- Feature Info & Tools -->
                <div class="card">
                    <div class="card-body">
                        <div class="section-title">
                            <i class="bi bi-layers"></i> ข้อมูลแปลง
                        </div>

                        <div id="featurePanel">
                            <div class="mb-2">
                                <strong>ID:</strong>
                                <input class="form-control" id="id" disabled>
                                <input type="hidden" id="tb">
                            </div>
                            <div class="mb-2">
                                <strong>เลขทะเบียนเกษตรกร:</strong>
                                <input class="form-control" id="xls_id_farmer" disabled>
                            </div>
                            <div class="mb-2">
                                <strong>เนื้อที่เป้าหมาย (m²):</strong>
                                <input class="form-control" id="xls_sqm" disabled>
                            </div>
                            <div class="mb-2">
                                <strong>เนื้อที่ขณะนี้ (m²):</strong>
                                <input class="form-control" id="shparea_sqm" disabled>
                            </div>
                            <p class="mt-2 text-danger" id="message" style="font-weight: 500;"></p>
                            <div class="mb-2">
                                <strong>re-final (โค้ดพี่เพียง):</strong>
                                <input class="form-control" type="text" id="refinal">
                            </div>
                        </div>

                        <hr>

                        <div class="section-title">
                            <i class="bi bi-tools"></i> เครื่องมือ
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-info" id="save">Save</button>
                            <button class="btn btn-success" id="classify">Classify แปลงที่นี้</button>
                            <button class="btn btn-light border" id="restore">restore</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= ROW 2 (TABLE) ================= -->
        <div class="row mt-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <table id="featureTable" class="display nowrap" style="width:100%;">
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modals -->
    <div class="modal fade" id="restoreModal" tabindex="-1" aria-labelledby="restoreModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content"
                style="border-radius: 12px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header"
                    style="background: linear-gradient(135deg, #e8f5e9, #f1f8e9); border-bottom: 1px solid rgba(76, 175, 80, 0.1);">
                    <h5 class="modal-title" id="restoreModalLabel" style="color: #2e7d32; font-weight: 600;">Restore
                        Feature</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="restoreName" class="form-label">ID ของ feature ที่ต้องการ restore</label>
                        <input type="number" class="form-control" id="restoreId" required>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid rgba(76, 175, 80, 0.1);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="btnRestore"
                        style="background: linear-gradient(135deg, #66bb6a, #43a047); border: none;">Restore
                        please</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="./amphoe.js"></script>
    <script src="./app.js"> </script>
</body>

</html>
