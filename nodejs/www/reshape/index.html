<!DOCTYPE html>
<html>

<head>
    <title> Reshape เเปลงยาง</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="./../assets/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container-fluid app-wrapper px-3">

        <!-- ================= ROW 1 ================= -->
        <div class="row main-row">

            <!-- Left Column: Map -->
            <div class="col-sm-8 map-col d-flex">
                <div class="card flex-fill" id="map"></div>
            </div>

            <!-- Right Column: Sidebar -->
            <div class="col-sm-4 sidebar-col">

                <!-- User Panel -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div></div>
                    <div id="user-panel" class="d-flex align-items-center">
                        <div id="profile-section" class="dropdown d-flex align-items-center"
                            style="display: none !important;">
                            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle"
                                data-bs-toggle="dropdown">
                                <img id="profile-image" class="rounded-circle me-2"
                                    style="width: 32px; height: 32px; object-fit: cover">
                                <span id="display-name" class="fw-medium"></span>
                                <input type="hidden" id="displayName">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#" id="logout-link">Logout</a></li>
                            </ul>
                        </div>
                        <a href="/rub3/auth/google" id="google-login-link">
                            <img src="https://developers.google.com/identity/images/btn_google_signin_dark_normal_web.png"
                                alt="Sign in with Google">
                        </a>
                    </div>
                </div>

                <div id="assignmentInfo" class="mb-2"></div>

                <!-- Navigation Menu -->

                <div class="card mb-2">
                    <div class="card-body nav-buttons">
                        <div class="section-title">
                            <i class="bi bi-compass"></i> เมนู
                        </div>
                        <div class="d-flex flex-wrap gap-2">
                            <a class="btn btn-secondary" href="./../index.html">
                                <i class="bi bi-house-heart-fill"></i> Home
                            </a>
                            <button class="btn btn-secondary" id="dashboard">Dashboard</button>
                        </div>
                    </div>
                </div>

                <!-- Feature Info & Tools -->
                <div class="card">
                    <div class="card-body">
                        <div class="section-title">
                            <i class="bi bi-layers"></i> ข้อมูลแปลง
                        </div>

                        <div id="featurePanel">
                            <div class="mb-2">
                                <strong>ID:</strong>
                                <input class="form-control" id="id" disabled>
                                <input type="hidden" id="tb">
                            </div>
                            <div class="mb-2">
                                <strong>เลขทะเบียนเกษตรกร:</strong>
                                <input class="form-control" id="xls_id_farmer" disabled>
                            </div>
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <strong>เนื้อที่ขณะนี้ (m²):</strong>
                                    <input class="form-control" id="current_sqm" disabled>
                                </div>
                                <div class="col-6">
                                    <strong>เนื้อที่ขณะนี้ (ไร่):</strong>
                                    <input class="form-control" id="current_rai" disabled>
                                </div>
                            </div>
                            <div class="mt-3">
                                <button class="btn btn-success w-100" id="classify" disabled>
                                    <i class="bi bi-diagram-3-fill me-1"></i>Classify แปลงที่นี้
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= ROW 2 (TABLE) ================= -->
        <div class="row mt-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <table id="featureTable" class="display nowrap" style="width:100%;">
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
    <script src="./amphoe.js"></script>
    <script src="./app.js?v=2"></script>
</body>

</html>
