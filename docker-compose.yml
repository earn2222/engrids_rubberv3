services:
  postgis:
    platform: linux/amd64
    image: postgis/postgis:latest
    container_name: rub_postgis
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=rub1234
      - POSTGRES_DB=postgres
    ports:
      - 5400:5432
    volumes:
      - ./postgis:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    networks:
      - rub-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  nodejs:
    build: ./nodejs
    container_name: rub_nodejs
    restart: always
    working_dir: /usr/src/app
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgis
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=rub1234
      - DB_NAME=rub2
    env_file:
      - .env
    depends_on:
      - postgis
    volumes:
      - ./nodejs:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3400:3000"
    networks:
      - rub-network
    command: sh -c "npm i -g nodemon && npm install && nodemon server.js"

  backup:
    build: ./backup
    container_name: rub_backup
    restart: always
    environment:
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=rub1234
      - POSTGRES_DB=rub2
      - BACKUP_INTERVAL_HOURS=24
      - BACKUP_KEEP_DAYS=7
      - BACKUP_DIR=/backups
    depends_on:
      postgis:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    ports:
      - "8100:8100"
    networks:
      - rub-network

networks:
  rub-network:
    driver: bridge

volumes:
  pgdata:
