services:
  postgis:
    platform: linux/amd64
    image: postgis/postgis:latest
    container_name: rub_postgis
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./postgis:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    networks:
      - rub-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  nodejs:
    build: ./nodejs
    container_name: rub_nodejs
    restart: always
    working_dir: /usr/src/app
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgis
      - DB_PORT=5432
    depends_on:
      - postgis
    volumes:
      - uploads_data:/usr/src/app/uploads
    ports:
      - "3400:3000"
    networks:
      - rub-network
    command: sh -c "nodemon server.js"

  backup:
    build: ./backup
    container_name: rub_backup
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - BACKUP_INTERVAL_HOURS=24
      - BACKUP_KEEP_DAYS=7
      - BACKUP_DIR=/backups
    depends_on:
      postgis:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    ports:
      - "8100:8100"
    networks:
      - rub-network

networks:
  rub-network:
    driver: bridge

volumes:
  pgdata:
  uploads_data:
